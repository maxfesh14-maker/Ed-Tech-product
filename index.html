<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Learning Engine | MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --accent: #ff4757; --success: #2ed573; --gold: #ffa502; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Game UI Panel */
        #game-ui { width: 100%; max-width: 480px; background: #222; padding: 15px; border-radius: 15px 15px 0 0; box-sizing: border-box; border: 1px solid #444; position: relative; }
        #level-bar { display: flex; align-items: center; gap: 12px; }
        #xp-bar { flex: 1; height: 12px; background: #444; border-radius: 6px; overflow: hidden; border: 1px solid #555; }
        #xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4caf50, #8bc34a); transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #xp-text { font-size: 0.75em; min-width: 70px; text-align: right; }
        
        #achievements { display: flex; gap: 8px; margin-top: 10px; justify-content: center; }
        .badge { padding: 5px 10px; border-radius: 6px; background: #333; opacity: 0.3; font-size: 0.75em; border: 1px solid #444; transition: 0.4s; }
        .badge.unlocked { background: var(--gold); opacity: 1; color: #000; font-weight: bold; box-shadow: 0 0 10px var(--gold); }

        #dailyQuest { margin-top: 10px; background: #1e272e; padding: 8px; border-radius: 8px; font-size: 0.8em; text-align: center; border: 1px solid #333; }
        
        /* Floating XP Popup */
        #xpPopup { position: absolute; left: 50%; top: 60px; transform: translateX(-50%); font-weight: bold; color: var(--success); pointer-events: none; font-size: 1.8em; z-index: 100; opacity: 0; }
        .xp-float { animation: xpFloat 1.2s ease-out forwards; }
        @keyframes xpFloat { 0% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50px) scale(1.4); } }

        /* Main Container */
        .app-container { background: var(--card); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); width: 100%; max-width: 480px; overflow: hidden; }
        .content { padding: 25px; text-align: center; }
        canvas { background: #fff; border-radius: 15px; margin: 15px 0; border: 4px solid #3d3d3d; width: 100%; height: auto; max-width: 400px; transition: transform 0.3s ease; }
        
        .btn-voice { background: var(--accent); color: white; padding: 20px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.3em; transition: 0.3s; }
        .btn-voice.active { background: var(--success); box-shadow: 0 0 25px var(--success); transform: scale(0.98); animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        #topic-title { margin: 0; color: #fff; min-height: 1.5em; }
        #status { font-size: 0.9em; color: #888; margin: 10px 0; }
        select { background: #444; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="game-ui">
        <div id="xpPopup"></div>
        <div id="level-bar">
            <b id="level-label">Lvl 1</b>
            <div id="xp-bar"><div id="xp-fill"></div></div>
            <span id="xp-text">0 / 100 XP</span>
        </div>
        <div id="achievements">
            <div class="badge" id="badge-pizza">🍕 Мастер пиццы</div>
            <div class="badge" id="badge-centurion">🛡 Центурион</div>
        </div>
        <div id="dailyQuest">📅 Задание: Сделай 5 дробей! <span id="questProgress">(0/5)</span></div>
    </div>

    <div class="content">
        <h2 id="topic-title">🍕 Готов к уроку?</h2>
        <p id="status">Нажми кнопку и скажи "половина"</p>
        
        <canvas id="mainCanvas" width="400" height="280"></canvas>
        
        <button id="voiceBtn" class="btn-voice">🎤 НАЧАТЬ ГОВОРИТЬ</button>
        
        <select id="topicSelect">
            <option value="fractions">🍕 Урок: Дроби</option>
            <option value="rome">🏛 Урок: Древний Рим</option>
        </select>
    </div>
</div>

<script>
    // --- ИНИЦИАЛИЗАЦИЯ ЗВУКОВ ---
    const soundWin = new Audio("https://cdn.jsdelivr.net/gh/jshawl/AudioFX/sounds/bling.mp3");

    // --- GAME STATE & PERSISTENCE ---
    const today = new Date().toDateString();
    let state = JSON.parse(localStorage.getItem('edtech_v1')) || {
        xp: 0, lvl: 1, xpNext: 100,
        lastDate: today,
        stats: { fractionStreak: 0, caesar: false },
        achievements: { pizza: false, rome: false },
        quest: { goal: 5, progress: 0, done: false }
    };

    // Сброс ежедневного квеста
    if (state.lastDate !== today) {
        state.quest = { goal: 5, progress: 0, done: false };
        state.lastDate = today;
    }

    function save() { localStorage.setItem('edtech_v1', JSON.stringify(state)); }

    // --- AI TUTOR & XP SYSTEM ---
    function addXP(amount, context = {}) {
        state.xp += amount;
        if (!context.silent) showXPPopup(amount);
        
        if (context.type === "fraction") {
            state.stats.fractionStreak++;
            updateQuest();
        } else { state.stats.fractionStreak = 0; }
        
        if (context.keyword === "caesar") state.stats.caesar = true;

        while (state.xp >= state.xpNext) {
            state.xp -= state.xpNext;
            state.lvl++;
            state.xpNext = Math.floor(state.xpNext * 1.3);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            speak("Ура! Новый уровень!");
        }
        checkBadges();
        updateUI();
        save();
    }

    function showXPPopup(n) {
        const el = document.getElementById("xpPopup");
        el.innerText = `+${n} XP`;
        el.classList.remove("xp-float");
        void el.offsetWidth;
        el.classList.add("xp-float");
    }

    function updateQuest() {
        if (!state.quest.done) {
            state.quest.progress++;
            if (state.quest.progress >= state.quest.goal) {
                state.quest.done = true;
                addXP(50, {silent: true});
                soundWin.play();
            }
        }
    }

    function checkBadges() {
        if (state.stats.fractionStreak >= 3 && !state.achievements.pizza) unlock("pizza", "badge-pizza");
        if (state.stats.caesar && !state.achievements.rome) unlock("rome", "badge-centurion");
    }

    function unlock(key, id) {
        state.achievements[key] = true;
        document.getElementById(id).classList.add("unlocked");
        soundWin.play();
    }

    function updateUI() {
        document.getElementById("level-label").innerText = `Lvl ${state.lvl}`;
        document.getElementById("xp-text").innerText = `${Math.floor(state.xp)} / ${state.xpNext} XP`;
        document.getElementById("xp-fill").style.width = (state.xp / state.xpNext * 100) + "%";
        document.getElementById("questProgress").innerText = `(${state.quest.progress}/${state.quest.goal})`;
        if (state.quest.done) document.getElementById("dailyQuest").style.color = "#2ed573";
        if (state.achievements.pizza) document.getElementById("badge-pizza").classList.add("unlocked");
        if (state.achievements.rome) document.getElementById("badge-centurion").classList.add("unlocked");
    }

    // --- VISUAL ENGINE (Canvas) ---
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    function drawPizza(num, den) {
        ctx.clearRect(0,0,400,280);
        const cx=200, cy=120, r=90;
        // Тесто
        ctx.beginPath(); ctx.arc(cx,cy,r+5,0,Math.PI*2); ctx.fillStyle="#d35400"; ctx.fill();
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle="#f1c40f"; ctx.fill();
        
        const step = (Math.PI*2)/den;
        for(let i=0; i<den; i++){
            ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,i*step,(i+1)*step);
            ctx.fillStyle = i < num ? "#e74c3c" : "#f39c12"; ctx.fill();
            ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
        }
        document.getElementById("topic-title").innerText = `🍕 Результат: ${num}/${den}`;
        canvas.style.transform = "scale(1.05)";
        setTimeout(() => canvas.style.transform = "scale(1)", 200);
    }

    function drawRome(year, label) {
        ctx.clearRect(0,0,400,280);
        ctx.beginPath(); ctx.moveTo(50,140); ctx.lineTo(350,140); ctx.strokeStyle="#333"; ctx.lineWidth=3; ctx.stroke();
        const events = [{y:-753, t:"Ромул"}, {y:-44, t:"Цезарь"}, {y:476, t:"Конец"}];
        events.forEach(ev => {
            let x = 50 + (ev.y + 800) / 1500 * 300;
            ctx.fillStyle = (ev.y === year) ? "#ff4757" : "#2c3e50";
            ctx.beginPath(); ctx.arc(x, 140, 8, 0, 7); ctx.fill();
            ctx.font="bold 12px Arial"; ctx.fillText(ev.t, x-20, 120);
            ctx.font="10px Arial"; ctx.fillText(ev.y, x-10, 160);
        });
        document.getElementById("topic-title").innerText = `🏛 Рим: ${label}`;
    }

    // --- VOICE & SPEECH ---
    function speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'ru-RU';
        speechSynthesis.speak(u);
    }

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Recognition) {
        const rec = new Recognition();
        rec.lang = 'ru-RU';
        rec.interimResults = false;

        document.getElementById('voiceBtn').onclick = () => {
            rec.start();
            document.getElementById('voiceBtn').classList.add('active');
            document.getElementById('status').innerText = "Слушаю...";
        };

        rec.onend = () => document.getElementById('voiceBtn').classList.remove('active');

        rec.onresult = (e) => {
            let cmd = e.results[0][0].transcript.toLowerCase().replace("ё", "е");
            document.getElementById('status').innerText = `Ты сказал: "${cmd}"`;

            if (topicSelect.value === "fractions") {
                if (cmd.includes("половин")) { drawPizza(1,2); addXP(15, {type:"fraction"}); }
                else if (cmd.includes("три четверт")) { drawPizza(3,4); addXP(20, {type:"fraction"}); }
                else if (cmd.includes("одну четверт")) { drawPizza(1,4); addXP(15, {type:"fraction"}); }
                else { speak("Почти! Попробуй сказать 'половина' или 'одна четвертая'."); }
            } else {
                if (cmd.includes("цезар")) { drawRome(-44, "Юлий Цезарь"); addXP(25, {keyword:"caesar"}); }
                else if (cmd.includes("ромул") || cmd.includes("основан")) { drawRome(-753, "Основание"); addXP(25); }
                else { speak("Хмм, назови имя основателя Рима или великого Цезаря."); }
            }
        };
    } else {
        alert("Твой браузер не поддерживает распознавание речи. Попробуй Chrome!");
    }

    // Старт
    updateUI();
    drawPizza(0,1);
</script>

</body>
</html>
